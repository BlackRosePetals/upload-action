name: Upload to Nexus Mods
description: Uploads a file to Nexus Mods
branding:
  icon: upload-cloud
  color: orange
inputs:
  api_key:
    description: API key
    required: true
  file_group_id:
    description: File Group ID on Nexus Mods
    required: true
  filename:
    description: Name of the zip file to upload
    required: true
  description:
    description: Description for the uploaded file used on Nexus Mods
  version:
    description: Version string for the uploaded file (e.g., 1.0.0)
    required: true
  file_category:
    description: File category for the uploaded file
    required: false
    default: main
  display_name:
    description: The display name for the uploaded file, defaults to the file name
    required: false
  archive_existing_file:
    description: Archive the existing file when uploading a new version
    required: false
    default: 'false'
  primary_mod_manager_download:
    description: Whether this file is the default download for mod managers
    required: false
  allow_mod_manager_download:
    description: Whether mod manager downloads are enabled for this file
    required: false
  show_requirements_pop_up:
    description: Whether to show a requirements popup when downloading this file
    required: false
outputs:
  file_uid:
    description: The UID of the uploaded file on Nexus Mods
runs:
  using: node20
  main: dist/index.js
