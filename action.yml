name: Upload to Nexus Mods
description: Uploads a file to Nexus Mods
branding:
  icon: upload-cloud
  color: orange
inputs:
  api_key:
    description: API key
    required: true
  file_id:
    description: File ID on Nexus Mods (game-scoped identifier from the file URL)
    required: true
  game_domain_name:
    description: Game Domain name on Nexus Mods (e.g., skyrimspecialedition)
    required: true
  filename:
    description: Name of the zip file to upload
    required: true
  version:
    description: Version string for the uploaded file (e.g., 1.0.0)
    required: true
  file_category:
    description: File category for the uploaded file
    required: false
    default: main
  display_name:
    description: The display name for the uploaded file, defaults to the file name
    required: false
outputs:
  file_uid:
    description: The UID of the uploaded file on Nexus Mods
runs:
  using: node20
  main: dist/index.js
